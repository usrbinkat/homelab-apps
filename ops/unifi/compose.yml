---
services:
  unifi-db:
    image: docker.io/mongo:7.0
    container_name: unifi-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_USER: unifi
      MONGO_PASS: ${MONGO_UNIFI_PASSWORD:-changeme}
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
    volumes:
      - unifi-db:/data/db
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    restart: unless-stopped

  unifi-network-application:
    image: lscr.io/linuxserver/unifi-network-application:latest
    container_name: unifi-network-application
    depends_on:
      - unifi-db
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
      MONGO_USER: unifi
      MONGO_PASS: ${MONGO_UNIFI_PASSWORD:-changeme}
      MONGO_HOST: unifi-db
      MONGO_PORT: 27017
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
      MEM_LIMIT: 1024
      MEM_STARTUP: 512
    volumes:
      - unifi-config:/config
    ports:
      - "${UNIFI_BIND_IP:-0.0.0.0}:8443:8443"
      - "${UNIFI_BIND_IP:-0.0.0.0}:3478:3478/udp"
      - "${UNIFI_BIND_IP:-0.0.0.0}:10001:10001/udp"
      - "${UNIFI_BIND_IP:-0.0.0.0}:8080:8080"
      - "${UNIFI_BIND_IP:-0.0.0.0}:1900:1900/udp"
      - "${UNIFI_BIND_IP:-0.0.0.0}:5514:5514/udp"
    restart: unless-stopped

volumes:
  unifi-db:
  unifi-config:
